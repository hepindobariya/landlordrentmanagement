name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # We run prebuild BEFORE setup-java so that gradle cache is configured successfully.
      - name: Create mobile/.env from secrets
        working-directory: mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=${{ secrets.EXPO_PUBLIC_API_URL }}" >> .env

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Generate native Android project (Expo prebuild)
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform android --no-install

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Ensure a debug keystore exists
        working-directory: mobile/android/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK (arm64-v8a only)
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK to Supabase and record the release
        working-directory: mobile
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          APK_PATH=$(ls android/app/build/outputs/apk/release/*.apk | head -n 1)
          echo "Found APK: $APK_PATH"
          echo "APK size:" && du -h "$APK_PATH"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          FILENAME="landlord-rent-${SHORT_SHA}.apk"
          curl -sS --fail-with-body -X POST \
            "${SUPABASE_URL}/storage/v1/object/app-builds/${FILENAME}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@${APK_PATH}"
          APK_URL="${SUPABASE_URL}/storage/v1/object/public/app-builds/${FILENAME}"
          echo "Public APK URL: $APK_URL"
          curl -sS --fail-with-body -X POST \
            "${SUPABASE_URL}/rest/v1/app_releases" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"android\",\"build_id\":\"${SHORT_SHA}\",\"apk_url\":\"${APK_URL}\"}"
          echo "Uploaded APK and recorded release ${SHORT_SHA}."

      - name: Attach APK to the workflow run
        uses: actions/upload-artifact@v4
        with:
          name: landlord-rent-android
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
